<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kubernetes Three-Tier Application</title>
    <style>
      body { font-family: Arial, sans-serif; background: #0f172a; color: #e5eefb; margin: 0; display: grid; place-items: center; min-height: 100vh; }
      .card { background: #111827; padding: 24px; border-radius: 16px; width: min(420px, calc(100% - 64px)); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35); }
      h1 { color: #38bdf8; margin-top: 0; }
      button, input { box-sizing: border-box; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #334155; margin-top: 8px; }
      button { background: #22c55e; color: white; cursor: pointer; }
      #result { margin-top: 12px; color: #bfdbfe; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kubernetes Three-Tier App</h1>
      <p>Frontend, backend, and PostgreSQL are running in the shodhan namespace.</p>
      <button id="loadBtn">Load saved message</button>
      <input id="note" type="text" placeholder="Type a message to save" />
      <button id="saveBtn">Save message</button>
      <div id="result">Waiting...</div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
