apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      version: blue
  template:
    metadata:
      labels:
        version: blue
    spec:
      containers:
      - name: blue-app
        image: shodhankb03/blue-app:v1
        ports:
        - containerPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      version: green
  template:
    metadata:
      labels:
        version: green
    spec:
      containers:
      - name: green-app
        image: shodhankb03/green-app:v1
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-service
spec:
  type: LoadBalancer
  selector:
    version: blue
  ports:
  - port: 80
    targetPort: 80